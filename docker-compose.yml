version: "3.9"

# ============================================================
# Rafiq – Docker Compose
# يضم خدمتين: قاعدة بيانات PostgreSQL + الـ Backend API
# ============================================================

services:
  # ----------------------------------------------------------
  # 1) PostgreSQL Database
  # ----------------------------------------------------------
  db:
    image: postgres:15-alpine
    container_name: rafiq_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-rafiq_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-rafiq_pass}
      POSTGRES_DB: ${DB_NAME:-rafiq_db}
    volumes:
      # البيانات بتتحفظ دايمًا حتى لو وقفت الحاوية
      - pgdata:/var/lib/postgresql/data
    ports:
      # لو حد في الفريق عايز يتصل بقاعدة البيانات مباشرة من PgAdmin مثلاً
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-rafiq_user} -d ${DB_NAME:-rafiq_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------
  # 2) Node.js Backend API
  # ----------------------------------------------------------
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rafiq_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy   # ينتظر حتى DB تكون جاهزة تمامًا
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 5000

      # ⬇️  يشير للـ db service اللي فوق (مش localhost)
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-rafiq_db}
      DB_USER: ${DB_USER:-rafiq_user}
      DB_PASSWORD: ${DB_PASSWORD:-rafiq_pass}

      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}

      BCRYPT_SALT_ROUNDS: ${BCRYPT_SALT_ROUNDS:-12}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8080}

      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-900000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-100}
      AUTH_RATE_LIMIT_MAX: ${AUTH_RATE_LIMIT_MAX:-5}

      # Paymob (اختياري – ابقى حطلها قيم لو محتاج الـ payment)
      PAYMOB_API_KEY: ${PAYMOB_API_KEY:-}
      PAYMOB_CARD_INTEGRATION_ID: ${PAYMOB_CARD_INTEGRATION_ID:-}
      PAYMOB_WALLET_INTEGRATION_ID: ${PAYMOB_WALLET_INTEGRATION_ID:-}
      PAYMOB_MEEZA_INTEGRATION_ID: ${PAYMOB_MEEZA_INTEGRATION_ID:-}
      PAYMOB_IFRAME_ID: ${PAYMOB_IFRAME_ID:-}
      PAYMOB_HMAC_SECRET: ${PAYMOB_HMAC_SECRET:-}
      PAYMOB_PUBLIC_KEY: ${PAYMOB_PUBLIC_KEY:-}
      PAYMOB_SECRET_KEY: ${PAYMOB_SECRET_KEY:-}
      MAX_VIDEO_SIZE: ${MAX_VIDEO_SIZE:-314572800}
    ports:
      - "${PORT:-5000}:5000"
    volumes:
      # ملفات الـ uploads بتتحفظ على الجهاز المحلي
      - ./backend/uploads:/app/uploads

# ----------------------------------------------------------
# Named Volumes
# ----------------------------------------------------------
volumes:
  pgdata:
    driver: local
